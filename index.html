<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAM Fuel Wizard</title>
<style>
body{font-family:sans-serif;background:#08111f;color:white;padding:15px}
button{width:100%;padding:14px;margin:6px 0;font-size:16px;border-radius:10px;border:none}
.card{background:#101b2d;padding:15px;border-radius:12px}
.top{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mode{background:#0a1322;border:1px solid #263759}
.mode.active{background:#1b3c66}
.result{margin-top:10px;padding:15px;border-radius:12px}
.good{background:#143a2a}
.warn{background:#3a2f14}
.bad{background:#3a1414}
</style>
</head>
<body>

<h2>FAM Fuel Wizard</h2>

<div class="top">
<button class="mode active" onclick="setMode('normal')" id="normalBtn">STANDARD</button>
<button class="mode" onclick="setMode('edto')" id="edtoBtn">EDTO</button>
</div>

<div id="app" class="card"></div>

<script>
let mode = "normal";
let step = "start";
let history = [];

function setMode(m){
  mode = m;
  step = "start";
  history = [];
  document.getElementById("normalBtn").classList.toggle("active", m==="normal");
  document.getElementById("edtoBtn").classList.toggle("active", m==="edto");
  render();
}

function next(s){
  history.push(step);
  step = s;
  render();
}

function back(){
  if(history.length){
    step = history.pop();
    render();
  }
}

function result(title, type, decision, minima, fuel, extra=""){
  document.getElementById("app").innerHTML = `
    <div class="result ${type}">
      <h3>${title}</h3>
      <p><b>Decision:</b> ${decision}</p>
      <p><b>Minima:</b> ${minima}</p>
      <p><b>Fuel:</b> ${fuel}</p>
      ${extra ? `<p><b>EDTO:</b> ${extra}</p>` : ""}
      <button onclick="reset()">Reset</button>
    </div>
  `;
}

function reset(){
  step="start";
  history=[];
  render();
}

function render(){
  let app = document.getElementById("app");

  // START
  if(step==="start"){
    app.innerHTML = `
      <h3>Flight phase</h3>
      <button onclick="next('dpa')">At / Before DPA</button>
      <button onclick="result('AFTER DPA','good','Continue','LANDING MINIMA','FRF protected')">After DPA</button>
    `;
  }

  // ===== EDTO ENTRY =====
  if(mode==="edto" && step==="dpa"){
    app.innerHTML = `
      <h3>Are you prior to EEP?</h3>
      <button onclick="next('edto_gate')">Yes</button>
      <button onclick="next('isolated')">No (inside EDTO)</button>
      <button onclick="back()">Back</button>
    `;
  }

  if(step==="edto_gate"){
    app.innerHTML = `
      <h3>EDTO Entry Check (EEP)</h3>
      <button onclick="next('edto_pass')">All satisfied</button>
      <button onclick="result('DO NOT ENTER EDTO','bad','Delay / divert','LANDING MINIMA','Maintain safe fuel','DO NOT ENTER EDTO SEGMENT')">Not satisfied</button>
      <button onclick="back()">Back</button>
    `;
  }

  if(step==="edto_pass"){
    result(
      "ENTER EDTO",
      "good",
      "Proceed into EDTO segment",
      "Use CH16 inflight minima logic",
      "Fuel must still meet CH16 requirements",
      "EDTO ENTRY APPROVED"
    );
  }

  // ===== NORMAL FLOW =====
  if(step==="dpa" && mode==="normal"){
    next("isolated");
    return;
  }

  if(step==="isolated"){
    app.innerHTML = `
      <h3>Is destination isolated?</h3>
      <button onclick="next('isoFuel')">Yes</button>
      <button onclick="next('fuelCheck')">No</button>
      <button onclick="back()">Back</button>
    `;
  }

  if(step==="isoFuel"){
    app.innerHTML = `
      <h3>90 min holding available?</h3>
      <button onclick="next('isoWeather')">Yes</button>
      <button onclick="result('DIVERT','bad','Cannot continue','LANDING MINIMA','Insufficient holding')">No</button>
      <button onclick="back()">Back</button>
    `;
  }

  if(step==="isoWeather"){
    app.innerHTML = `
      <h3>Above Qualifying Minima?</h3>
      <button onclick="result('CONTINUE','good','Proceed','QUALIFYING MINIMA','90 min holding protected')">Yes</button>
      <button onclick="result('DIVERT','bad','Cannot continue','LANDING MINIMA','Weather below QM')">No</button>
      <button onclick="back()">Back</button>
    `;
  }

  if(step==="fuelCheck"){
    app.innerHTML = `
      <h3>All fuel protected?</h3>
      <button onclick="next('weather')">Yes</button>
      <button onclick="result('DIVERT','bad','Stop here','LANDING MINIMA','Fuel not protected')">No</button>
      <button onclick="back()">Back</button>
    `;
  }

  if(step==="weather"){
    app.innerHTML = `
      <h3>Destination weather</h3>
      <button onclick="next('noAlt')">≥ Determining Minima</button>
      <button onclick="next('rdm')">Between DM and LM</button>
      <button onclick="next('altReq')">Below LM / No forecast</button>
      <button onclick="back()">Back</button>
    `;
  }

  if(step==="noAlt"){
    result(
      "CONTINUE",
      "good",
      "No alternate required",
      "DETERMINING MINIMA / RDM",
      "Protect required holding"
    );
  }

  if(step==="rdm"){
    app.innerHTML = `
      <h3>RDM available?</h3>
      <button onclick="result('CONTINUE','good','Remain no-alt branch','RDM','Fuel protected')">Yes</button>
      <button onclick="next('altReq')">No</button>
      <button onclick="back()">Back</button>
    `;
  }

  if(step==="altReq"){
    app.innerHTML = `
      <h3>Alternate meets requirements?</h3>
      <button onclick="result('CONTINUE','warn','Proceed with alternate','QUALIFYING MINIMA','Alternate fuel protected')">Yes</button>
      <button onclick="result('DIVERT','bad','Stop here','LANDING MINIMA','Alternate not suitable')">No</button>
      <button onclick="back()">Back</button>
    `;
  }
}

render();
</script>

</body>
</html>
